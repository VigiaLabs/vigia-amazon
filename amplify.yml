version: 1
applications:
  - appRoot: packages/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            # Install all workspace deps from monorepo root so hoisted packages resolve
            - cd ../.. && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          # Workspace root node_modules (hoisted deps including AWS SDK)
          - ../../node_modules/**/*
          # Next.js build cache
          - .next/cache/**/*
