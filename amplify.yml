version: 1
applications:
  - appRoot: packages/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            # Install all workspace deps from monorepo root without changing cwd.
            # Using --prefix keeps us in packages/frontend so the build phase
            # runs Next.js only, not the root "build --workspaces" script.
            - npm ci --prefix ../..
        build:
          commands:
            # Write ALL Amplify environment variables into .env.production
            # so Next.js SSR / API routes can read them at runtime.
            - |
              env | grep -E '^(AGENT_RATE_LIMIT_TABLE_NAME|HAZARDS_TABLE_NAME|LEDGER_TABLE_NAME|MAINTENANCE_TABLE_NAME|TRACES_TABLE_NAME|URBAN_PLANNER_FUNCTION_NAME|MAINTENANCE_FUNCTION_NAME|AWS_REGION|AWS_DEFAULT_REGION|NEXT_PUBLIC_)' >> .env.production || true
              echo "--- .env.production ---" && cat .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          # Workspace root node_modules (hoisted deps including AWS SDK)
          - ../../node_modules/**/*
          # Frontend node_modules (if any local deps)
          - node_modules/**/*
          # Next.js build cache
          - .next/cache/**/*
